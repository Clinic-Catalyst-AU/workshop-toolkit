<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Install Chat - Clinic Catalyst Workshop</title>
<style>
  :root{--teal:#0E4D4A;--teal2:#13615C;--mint:#4FB3A6;--gold:#C9A86A;--ink:#13211F;--muted:#5E726E;--bg:#F4F8F6;--card:#FFFFFF;--line:#DCE8E4;--code:#0B2E2B;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;line-height:1.5;display:flex;flex-direction:column;height:100vh}
  .hero{background:linear-gradient(150deg,var(--teal),var(--teal2));color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;flex:0 0 auto}
  .hero .t{font-weight:800;font-size:16px}
  .hero .t span{color:var(--mint);font-weight:600;font-size:12px;display:block}
  .whoBox{display:flex;gap:8px;align-items:center}
  .whoBox label{font-size:12px;font-weight:700;color:var(--mint)}
  .whoBox input{border:1.5px solid rgba(255,255,255,.5);background:rgba(255,255,255,.12);color:#fff;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:600;width:180px}
  .whoBox input::placeholder{color:rgba(255,255,255,.6)}
  .whoBox input:focus{outline:none;border-color:#fff;background:rgba(255,255,255,.2)}
  #feed{flex:1 1 auto;overflow-y:auto;padding:18px 16px;max-width:820px;width:100%;margin:0 auto}
  .msg{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin:0 0 12px;position:relative}
  .msg .meta{font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
  .msg.team{border-color:var(--mint);background:#F0FAF8}
  .msg.team .meta{color:var(--teal2)}
  .msg.mine .meta{color:#b8743d}
  .msg pre{margin:0;white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px}
  .msg .copy{position:absolute;top:10px;right:10px;background:var(--mint);color:#06302c;border:none;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;opacity:.85}
  .msg .copy:active{transform:scale(.96)}
  .empty{max-width:820px;margin:30px auto;text-align:center;color:var(--muted);font-size:14px}
  .composer{flex:0 0 auto;border-top:1px solid var(--line);background:#fff;padding:12px 16px}
  .composer .inner{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
  textarea{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;min-height:64px;max-height:220px;resize:vertical}
  textarea:focus{outline:none;border-color:var(--mint)}
  .send{background:var(--teal);color:#fff;border:none;border-radius:12px;padding:12px 22px;font-weight:800;font-size:14px;cursor:pointer}
  .send:disabled{opacity:.5}
  .hint{max-width:820px;margin:6px auto 0;font-size:11.5px;color:var(--muted);text-align:right}
</style>
</head>
<body>
<div class="hero">
  <div class="t">Install Chat<span>stuck during install? paste your terminal output here - we watch this page</span></div>
  <div class="whoBox">
    <label for="who">Your clinic:</label>
    <input id="who" placeholder="e.g. Bonnie Lass" maxlength="60">
  </div>
</div>
<div id="feed"></div>
<div class="composer">
  <div class="inner">
    <textarea id="box" placeholder="Paste the whole terminal output (errors and all) or type what you're stuck on..."></textarea>
    <button class="send" id="send">Send</button>
  </div>
  <div class="hint">Cmd+Enter sends &middot; refreshes every few seconds &middot; this page is shared with the room</div>
</div>
<script>
const URL_ = "https://jiquevvzrdavgqonvvug.supabase.co/rest/v1/cc_workshop_helpline";
const KEY = "sb_publishable_siNrWACQh9utYNJ_g6Mt3Q_vWuxhkaJ";
const H = {"apikey": KEY, "Authorization": "Bearer " + KEY, "Content-Type": "application/json"};
const TEAM = ["kelly", "claude", "alicia"];
const seen = new Set();
const whoInput = document.getElementById("who");
whoInput.value = localStorage.getItem("cc-workshop-who") || "";
whoInput.addEventListener("input", () => localStorage.setItem("cc-workshop-who", whoInput.value.trim()));

function render(rows){
  const feed = document.getElementById("feed");
  const stick = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 80;
  rows.sort((a, b) => a.id - b.id);
  for (const r of rows){
    if (seen.has(r.id)) continue;
    seen.add(r.id);
    const d = document.createElement("div");
    const mine = r.sender.trim().toLowerCase() === whoInput.value.trim().toLowerCase() && r.sender.trim() !== "";
    d.className = "msg" + (TEAM.includes(r.sender.trim().toLowerCase()) ? " team" : "") + (mine ? " mine" : "");
    const when = new Date(r.created_at).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    const meta = document.createElement("div"); meta.className = "meta"; meta.textContent = r.sender + " - " + when;
    const pre = document.createElement("pre"); pre.textContent = r.message;
    const btn = document.createElement("button"); btn.className = "copy"; btn.textContent = "Copy";
    btn.onclick = () => { navigator.clipboard.writeText(r.message); btn.textContent = "Copied"; setTimeout(()=>btn.textContent="Copy", 1400); };
    d.append(meta, pre, btn); feed.appendChild(d);
  }
  if (feed.children.length === 0 && !document.getElementById("emptyNote")){
    const e = document.createElement("div"); e.className = "empty"; e.id = "emptyNote";
    e.textContent = "No messages yet. If your install throws an error, paste it here with your clinic name set above.";
    feed.appendChild(e);
  } else if (feed.children.length > 1) {
    const e = document.getElementById("emptyNote"); if (e) e.remove();
  }
  if (stick) feed.scrollTop = feed.scrollHeight;
}

async function poll(){
  try {
    const r = await fetch(URL_ + "?select=*&order=id.desc&limit=100", {headers: H});
    if (r.ok) render(await r.json());
  } catch(e){}
}

async function send(){
  const box = document.getElementById("box");
  const text = box.value.trim();
  const who = whoInput.value.trim();
  if (!text) return;
  if (!who){ whoInput.focus(); whoInput.placeholder = "Type your clinic name first"; return; }
  document.getElementById("send").disabled = true;
  try {
    await fetch(URL_, {method: "POST", headers: H, body: JSON.stringify({sender: who, message: text})});
    box.value = "";
    await poll();
  } finally { document.getElementById("send").disabled = false; }
}
document.getElementById("send").onclick = send;
document.getElementById("box").addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") send();
});

poll();
setInterval(poll, 4000);
</script>
</body>
</html>
